<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cave à Vin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --burgundy: #6B1A2A;
    --deep-red: #8B2635;
    --rose: #C4687A;
    --champagne: #E8D5A3;
    --cream: #F5EED8;
    --gold: #C9A84C;
    --dark: #1A0A0E;
    --charcoal: #2D1A20;
    --white-wine: #E8D87A;
    --rose-color: #E8A0A8;
    --red-wine: #8B2635;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Raleway', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(107,26,42,0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(139,38,53,0.2) 0%, transparent 60%),
      repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding-bottom: 90px; }

  /* Header */
  .header {
    padding: 50px 24px 24px;
    text-align: center;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }
  .header-icon { font-size: 32px; margin-bottom: 8px; }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--champagne);
    text-transform: uppercase;
  }
  .header h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .header-subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--rose);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(201,168,76,0.1);
    margin: 0;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .stat-item {
    padding: 14px 8px;
    text-align: center;
    background: var(--dark);
    cursor: pointer;
    transition: background 0.2s;
  }
  .stat-item:hover { background: rgba(107,26,42,0.4); }
  .stat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin: 0 auto 6px;
  }
  .dot-rouge { background: var(--red-wine); box-shadow: 0 0 8px var(--red-wine); }
  .dot-blanc { background: var(--white-wine); box-shadow: 0 0 8px var(--white-wine); }
  .dot-rose { background: var(--rose-color); box-shadow: 0 0 8px var(--rose-color); }
  .dot-all { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .stat-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--champagne);
    line-height: 1;
  }
  .stat-label { font-size: 9px; letter-spacing: 2px; color: rgba(232,213,163,0.5); text-transform: uppercase; margin-top: 2px; }

  /* Filter bar */
  .filter-section { padding: 16px 16px 8px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    background: transparent;
    color: rgba(232,213,163,0.7);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--burgundy);
    border-color: var(--gold);
    color: var(--champagne);
  }
  .search-box {
    width: 100%;
    padding: 10px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: rgba(232,213,163,0.3); }

  /* Sort */
  .sort-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 12px;
  }
  .results-count { font-size: 11px; color: rgba(232,213,163,0.4); letter-spacing: 1px; }
  .sort-select {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
    color: rgba(232,213,163,0.6);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
  }
  .sort-select option { background: var(--dark); }

  /* Wine list */
  .wine-list { padding: 0 16px; }

  /* Group header */
  .group-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0 10px;
  }
  .group-line { flex: 1; height: 1px; background: rgba(201,168,76,0.15); }
  .group-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--gold);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  /* Wine card */
  .wine-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .wine-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .wine-card.rouge::before { background: linear-gradient(180deg, #8B2635, #C4687A); }
  .wine-card.blanc::before { background: linear-gradient(180deg, #E8D87A, #C9A84C); }
  .wine-card.rose::before { background: linear-gradient(180deg, #E8A0A8, #C4687A); }
  .wine-card.petillant::before { background: linear-gradient(180deg, #A8D8EA, #7BB3C4); }

  .wine-card:hover {
    background: rgba(107,26,42,0.2);
    border-color: rgba(201,168,76,0.3);
    transform: translateX(3px);
  }

  .wine-color-badge {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-rouge { background: radial-gradient(circle at 35% 35%, #C4687A, #4A0E1A); }
  .badge-blanc { background: radial-gradient(circle at 35% 35%, #F0E8A0, #9A8430); }
  .badge-rose { background: radial-gradient(circle at 35% 35%, #F0B8C0, #8A4050); }
  .badge-petillant { background: radial-gradient(circle at 35% 35%, #C8E8F8, #5090A8); }

  .wine-info { flex: 1; min-width: 0; }
  .wine-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--champagne);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .wine-domain {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .wine-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .wine-tag {
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
    text-transform: uppercase;
    color: rgba(232,213,163,0.6);
    border-color: rgba(232,213,163,0.15);
  }

  .wine-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .wine-year {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: var(--gold);
    font-weight: 300;
    line-height: 1;
  }
  .wine-bottles {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: rgba(232,213,163,0.5);
  }
  .bottle-icon { font-size: 14px; }

  /* Rating stars */
  .wine-rating { color: var(--gold); font-size: 11px; letter-spacing: 1px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: rgba(232,213,163,0.3);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: calc(80px + env(safe-area-inset-bottom));
    right: 24px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--burgundy), var(--deep-red));
    border: 2px solid var(--gold);
    color: var(--champagne);
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(107,26,42,0.6), 0 0 30px rgba(201,168,76,0.15);
    transition: all 0.2s;
    z-index: 100;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(107,26,42,0.8); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: rgba(26,10,14,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(201,168,76,0.15);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 99;
  }
  .nav-item {
    flex: 1;
    padding: 12px 8px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
    color: rgba(232,213,163,0.35);
  }
  .nav-item.active { color: var(--gold); }
  .nav-item:hover { color: rgba(232,213,163,0.7); }
  .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
  .nav-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'Raleway', sans-serif; }

  /* Modal Overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,4,6,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--charcoal);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    width: 40px; height: 4px;
    background: rgba(201,168,76,0.3);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--champagne);
    font-style: italic;
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: none;
    color: var(--cream);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-body { padding: 20px 24px 32px; }

  /* Form */
  .form-section-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 24px;
  }
  .form-section-title:first-child { margin-top: 0; }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; letter-spacing: 1px; color: rgba(232,213,163,0.5); margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
  .form-select option { background: var(--charcoal); }
  .form-textarea { resize: none; height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Color selector */
  .color-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .color-option {
    padding: 12px 6px;
    border: 2px solid rgba(201,168,76,0.15);
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .color-option.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
  }
  .color-option .co-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .color-option .co-label { font-size: 9px; letter-spacing: 1px; color: rgba(232,213,163,0.6); text-transform: uppercase; }

  /* Rating input */
  .rating-input { display: flex; gap: 8px; }
  .rating-star {
    font-size: 24px;
    cursor: pointer;
    transition: transform 0.1s;
    color: rgba(201,168,76,0.2);
    border: none;
    background: none;
  }
  .rating-star.active { color: var(--gold); }
  .rating-star:hover { transform: scale(1.2); }

  /* Save button */
  .save-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--burgundy), var(--deep-red));
    border: 1px solid var(--gold);
    border-radius: 12px;
    color: var(--champagne);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 24px;
  }
  .save-btn:hover { background: linear-gradient(135deg, #8B2635, #A03040); }

  /* Detail modal */
  .detail-header {
    position: relative;
    padding: 30px 24px 24px;
    text-align: center;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }
  .detail-color-icon { font-size: 48px; margin-bottom: 8px; }
  .detail-wine-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--champagne);
    line-height: 1.2;
  }
  .detail-domain { color: var(--gold); font-size: 13px; letter-spacing: 2px; margin-top: 4px; }
  .detail-year-badge {
    display: inline-block;
    padding: 4px 16px;
    border: 1px solid var(--gold);
    border-radius: 20px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    margin-top: 12px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: rgba(201,168,76,0.1);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .detail-item {
    background: rgba(255,255,255,0.02);
    padding: 14px;
    text-align: center;
  }
  .detail-item-label { font-size: 9px; letter-spacing: 2px; color: rgba(232,213,163,0.4); text-transform: uppercase; margin-bottom: 6px; }
  .detail-item-value { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--champagne); }
  .detail-notes {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: rgba(232,213,163,0.7);
    font-style: italic;
    margin-bottom: 20px;
  }
  .detail-actions { display: flex; gap: 10px; }
  .btn-secondary {
    flex: 1;
    padding: 12px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    background: transparent;
    color: rgba(232,213,163,0.7);
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger {
    flex: 1;
    padding: 12px;
    border: 1px solid rgba(196,104,122,0.3);
    border-radius: 10px;
    background: transparent;
    color: var(--rose);
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: rgba(196,104,122,0.1); }

  /* Stats view */
  .stats-view { display: none; padding: 24px 16px; }
  .stats-view.active { display: block; }

  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .stat-card-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .bar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .bar-label { font-size: 12px; color: rgba(232,213,163,0.7); width: 80px; text-align: right; }
  .bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .bar-fill.rouge { background: linear-gradient(90deg, #8B2635, #C4687A); }
  .bar-fill.blanc { background: linear-gradient(90deg, #9A8430, #E8D87A); }
  .bar-fill.rose { background: linear-gradient(90deg, #8A4050, #E8A0A8); }
  .bar-count { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--champagne); width: 24px; }

  /* Sommelier view */
  .sommelier-view { display: none; padding: 24px 16px; }
  .sommelier-view.active { display: block; }
  .sommelier-header { text-align: center; margin-bottom: 24px; }
  .sommelier-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--champagne); font-style: italic; }
  .sommelier-sub { font-size: 10px; letter-spacing: 3px; color: var(--rose); text-transform: uppercase; margin-top: 4px; }
  .suggestion-card {
    background: rgba(107,26,42,0.15);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .suggestion-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--champagne); margin-bottom: 8px; }
  .suggestion-card p { font-size: 12px; color: rgba(232,213,163,0.6); line-height: 1.6; }
  .suggestion-card .s-tag { display: inline-block; margin-top: 10px; padding: 3px 10px; border: 1px solid rgba(201,168,76,0.3); border-radius: 20px; font-size: 10px; color: var(--gold); }

  .cave-view { display: block; }
  .cave-view.hidden { display: none; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-icon">🍷</div>
    <h1>Cave <em>à Vin</em></h1>
    <div class="header-subtitle">Gestion de ma cave</div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item" onclick="filterByColor('all')">
      <div class="stat-dot dot-all"></div>
      <div class="stat-count" id="countAll">0</div>
      <div class="stat-label">Tous</div>
    </div>
    <div class="stat-item" onclick="filterByColor('rouge')">
      <div class="stat-dot dot-rouge"></div>
      <div class="stat-count" id="countRouge">0</div>
      <div class="stat-label">Rouge</div>
    </div>
    <div class="stat-item" onclick="filterByColor('blanc')">
      <div class="stat-dot dot-blanc"></div>
      <div class="stat-count" id="countBlanc">0</div>
      <div class="stat-label">Blanc</div>
    </div>
    <div class="stat-item" onclick="filterByColor('rose')">
      <div class="stat-dot dot-rose"></div>
      <div class="stat-count" id="countRose">0</div>
      <div class="stat-label">Rosé</div>
    </div>
  </div>

  <!-- Cave view -->
  <div class="cave-view" id="caveView">
    <!-- Filters -->
    <div class="filter-section">

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Ajouter un vin</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-section-title">Couleur</div>

        <div class="color-option selected" onclick="selectColor('rouge',this)">
          <span class="co-icon">🍷</span>
          <span class="co-label">Rouge</span>
        </div>
        <div class="color-option" onclick="selectColor('blanc',this)">

          <span class="co-label">Blanc</span>
        </div>
        <div class="color-option" onclick="selectColor('rose',this)">
          <span class="co-icon">🌸</span>
          <span class="co-label">Rosé</span>
        </div>
        <div class="color-option" onclick="selectColor('petillant',this)">
          <span class="co-icon">✨</span>
          <span class="co-label">Pétill.</span>
        </div>

      <div class="form-section-title">Identification</div>

            <option>Espagne</option>
            <option>Portugal</option>
            <option>États-Unis</option>
            <option>Allemagne</option>
            <option>Argentine</option>
            <option>Chili</option>
            <option>Australie</option>

          <input type="number" class="form-input" id="inputApogee" placeholder="2028">

          <button class="rating-star" onclick="setRating(1)">★</button>
          <button class="rating-star" onclick="setRating(2)">★</button>
          <button class="rating-star" onclick="setRating(3)">★</button>
          <button class="rating-star" onclick="setRating(4)">★</button>
          <button class="rating-star" onclick="setRating(5)">★</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes de dégustation</label>
        <textarea class="form-textarea" id="inputNotes" placeholder="Arômes, saveurs, impressions..."></textarea>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
// ====== DATA ======
const ICONS = { rouge:'🍷', blanc:'🥂', rose:'🌸', petillant:'✨' };
const BADGE_CLASS = { rouge:'badge-rouge', blanc:'badge-blanc', rose:'badge-rose', petillant:'badge-petillant' };

let wines = JSON.parse(localStorage.getItem('cave_wines') || '[]');
let selectedColor = 'rouge';
let selectedRating = 0;
let filterColor = 'all';
let filterRegion = 'all';
let filterCepage = 'all';
let editingId = null;
let currentView = 'cave';

const REGION_MAP = {
  'France': ['Bordeaux','Bourgogne','Champagne','Rhône','Loire','Alsace','Provence','Languedoc','Corse'],
  'Italie': ['Toscane','Piémont','Vénétie','Sicile','Sardaigne','Ombrie'],
  'Espagne': ['Rioja','Ribera del Duero','Priorat','Galice','Castille'],
  'Portugal': ['Douro','Alentejo','Vinho Verde','Lisboa'],
  'États-Unis': ['Napa Valley','Sonoma','Oregon','Washington'],
  'Allemagne': ['Moselle','Rhin','Rheingau'],
  'Argentine': ['Mendoza','Patagonie','Salta'],
  'Chili': ['Maipo','Colchagua','Casablanca'],
  'Australie': ['Barossa','Clare Valley','Yarra Valley']
};

function save() { localStorage.setItem('cave_wines', JSON.stringify(wines)); }

// ====== FILTERS ======
function filterByColor(color) {
  filterColor = color;
  filterRegion = 'all';
  filterCepage = 'all';
  buildFilterButtons();
  renderList();
}

function setFilter(type, val, btn) {
  if (type === 'region') { filterRegion = val; document.querySelectorAll('#regionFilter .filter-btn').forEach(b => b.classList.remove('active')); }
  if (type === 'cepage') { filterCepage = val; document.querySelectorAll('#cepageFilter .filter-btn').forEach(b => b.classList.remove('active')); }
  btn.classList.add('active');
  renderList();
}

function buildFilterButtons() {
  // Regions
  let filtered = wines.filter(w => filterColor === 'all' || w.couleur === filterColor);
  let regions = [...new Set(filtered.map(w => w.region).filter(Boolean))].sort();
  let cepages = [...new Set(filtered.flatMap(w => (w.cepage||'').split(',').map(c => c.trim())).filter(Boolean))].sort();

  const rf = document.getElementById('regionFilter');
  rf.innerHTML = `<button class="filter-btn ${filterRegion==='all'?'active':''}" onclick="setFilter('region','all',this)">Toutes</button>`;
  regions.forEach(r => {
    rf.innerHTML += `<button class="filter-btn ${filterRegion===r?'active':''}" onclick="setFilter('region','${r}',this)">${r}</button>`;
  });

  const cf = document.getElementById('cepageFilter');
  cf.innerHTML = `<button class="filter-btn ${filterCepage==='all'?'active':''}" onclick="setFilter('cepage','all',this)">Tous</button>`;
  cepages.forEach(c => {
    cf.innerHTML += `<button class="filter-btn ${filterCepage===c?'active':''}" onclick="setFilter('cepage','${c}',this)">${c}</button>`;
  });
}

// ====== RENDER ======
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sortEl = document.querySelector('.sort-select');
  const sort = sortEl ? sortEl.value : 'annee_desc';

  let list = wines.filter(w => {
    if (filterColor !== 'all' && w.couleur !== filterColor) return false;
    if (filterRegion !== 'all' && w.region !== filterRegion) return false;
    if (filterCepage !== 'all' && !(w.cepage||'').toLowerCase().includes(filterCepage.toLowerCase())) return false;
    if (q) {
      const str = `${w.nom} ${w.domaine} ${w.pays} ${w.region} ${w.cepage} ${w.appellation}`.toLowerCase();
      if (!str.includes(q)) return false;
    }
    return true;
  });

  list.sort((a,b) => {
    if (sort === 'annee_desc') return (b.annee||0)-(a.annee||0);
    if (sort === 'annee_asc') return (a.annee||0)-(b.annee||0);
    if (sort === 'nom') return (a.nom||'').localeCompare(b.nom||'');
    if (sort === 'region') return (a.region||'').localeCompare(b.region||'');
    if (sort === 'note_desc') return (b.note||0)-(a.note||0);
    if (sort === 'quantite_desc') return (b.quantite||0)-(a.quantite||0);
  });
  return list;
}

function renderList() {
  updateCounts();
  buildFilterButtons();

  const list = getFiltered();
  const container = document.getElementById('wineList');
  const sortEl = document.querySelector('.sort-select');
  const sort = sortEl ? sortEl.value : 'annee_desc';

  // Count
  const total = list.reduce((s,w) => s + (parseInt(w.quantite)||1), 0);
  document.getElementById('resultsCount').textContent = `${total} bouteille${total>1?'s':''}`;

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🍾</div><p>Votre cave est vide…<br>Commencez à l'alimenter !</p></div>`;
    return;
  }

  // Group
  let grouped = {};
  let getGroup = w => {
    if (sort === 'region') return w.region || 'Sans région';
    if (sort === 'nom') return (w.nom||'?')[0].toUpperCase();
    if (sort === 'annee_asc' || sort === 'annee_desc') return w.annee ? `${w.annee}` : 'Sans millésime';
    return '';
  };

  if (['region','nom','annee_asc','annee_desc'].includes(sort)) {
    list.forEach(w => {
      let g = getGroup(w);
      if (!grouped[g]) grouped[g] = [];
      grouped[g].push(w);
    });
  } else {
    grouped[''] = list;
  }

  let html = '';
  Object.keys(grouped).sort((a,b) => {
    if (sort === 'annee_desc') return b.localeCompare(a);
    if (sort === 'annee_asc') return a.localeCompare(b);
    return a.localeCompare(b);
  }).forEach(group => {
    if (group) {
      html += `<div class="group-header"><div class="group-line"></div><div class="group-title">${group}</div><div class="group-line"></div></div>`;
    }
    grouped[group].forEach(w => {
      const stars = '★'.repeat(w.note||0) + '☆'.repeat(5-(w.note||0));
      const tags = [w.pays, w.region, w.appellation, w.cepage].filter(Boolean).slice(0,3);
      html += `
        <div class="wine-card ${w.couleur}" onclick="openDetail(${w.id})">
          <div class="wine-color-badge ${BADGE_CLASS[w.couleur]}">${ICONS[w.couleur]}</div>
          <div class="wine-info">
            <div class="wine-name">${w.nom}</div>
            ${w.domaine ? `<div class="wine-domain">${w.domaine}</div>` : ''}
            <div class="wine-tags">${tags.map(t=>`<span class="wine-tag">${t}</span>`).join('')}</div>
          </div>
          <div class="wine-meta">
            <div class="wine-year">${w.annee||'—'}</div>
            <div class="wine-rating">${stars}</div>
            <div class="wine-bottles"><span class="bottle-icon">🍾</span>${w.quantite||1}</div>
          </div>
        </div>`;
    });
  });
  container.innerHTML = html;
}

function updateCounts() {
  document.getElementById('countAll').textContent = wines.reduce((s,w)=>s+(parseInt(w.quantite)||1),0);
  document.getElementById('countRouge').textContent = wines.filter(w=>w.couleur==='rouge').reduce((s,w)=>s+(parseInt(w.quantite)||1),0);
  document.getElementById('countBlanc').textContent = wines.filter(w=>w.couleur==='blanc').reduce((s,w)=>s+(parseInt(w.quantite)||1),0);
  document.getElementById('countRose').textContent = wines.filter(w=>w.couleur==='rose'||w.couleur==='petillant').reduce((s,w)=>s+(parseInt(w.quantite)||1),0);
}

// ====== ADD/EDIT ======
function openAdd() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Ajouter un vin';
  ['inputNom','inputDomaine','inputAnnee','inputQuantite','inputPays','inputRegion','inputAppellation','inputCepage','inputPrix','inputApogee','inputNotes'].forEach(id => {
    const el = document.getElementById(id);
    el.value = id === 'inputQuantite' ? '1' : '';
  });
  selectedColor = 'rouge';
  document.querySelectorAll('.color-option').forEach((o,i) => o.classList.toggle('selected', i===0));
  selectedRating = 0;
  updateStars(0);
  openModal('addModal');
}

function openEdit(id) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  editingId = id;
  closeModal('detailModal');
  setTimeout(() => {
    document.getElementById('modalTitle').textContent = 'Modifier le vin';
    document.getElementById('inputNom').value = w.nom || '';
    document.getElementById('inputDomaine').value = w.domaine || '';
    document.getElementById('inputAnnee').value = w.annee || '';
    document.getElementById('inputQuantite').value = w.quantite || 1;
    document.getElementById('inputPays').value = w.pays || '';
    document.getElementById('inputRegion').value = w.region || '';
    document.getElementById('inputAppellation').value = w.appellation || '';
    document.getElementById('inputCepage').value = w.cepage || '';
    document.getElementById('inputPrix').value = w.prix || '';
    document.getElementById('inputApogee').value = w.apogee || '';
    document.getElementById('inputNotes').value = w.notes || '';
    selectedColor = w.couleur || 'rouge';
    const colorMap = {rouge:0, blanc:1, rose:2, petillant:3};
    document.querySelectorAll('.color-option').forEach((o,i) => o.classList.toggle('selected', i===colorMap[selectedColor]));
    selectedRating = w.note || 0;
    updateStars(selectedRating);
    openModal('addModal');
  }, 300);
}

function selectColor(color, el) {
  selectedColor = color;
  document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function setRating(n) { selectedRating = n; updateStars(n); }
function updateStars(n) {
  document.querySelectorAll('.rating-star').forEach((s,i) => s.classList.toggle('active', i<n));
}

function saveWine() {
  const nom = document.getElementById('inputNom').value.trim();
  if (!nom) { document.getElementById('inputNom').style.borderColor='var(--rose)'; setTimeout(()=>document.getElementById('inputNom').style.borderColor='',2000); return; }

  const wine = {
    id: editingId || Date.now(),
    couleur: selectedColor,
    nom,
    domaine: document.getElementById('inputDomaine').value.trim(),
    annee: parseInt(document.getElementById('inputAnnee').value) || null,
    quantite: parseInt(document.getElementById('inputQuantite').value) || 1,
    pays: document.getElementById('inputPays').value,
    region: document.getElementById('inputRegion').value.trim(),
    appellation: document.getElementById('inputAppellation').value.trim(),
    cepage: document.getElementById('inputCepage').value.trim(),
    prix: parseFloat(document.getElementById('inputPrix').value) || null,
    apogee: parseInt(document.getElementById('inputApogee').value) || null,
    note: selectedRating,
    notes: document.getElementById('inputNotes').value.trim(),
    dateAjout: editingId ? (wines.find(w=>w.id===editingId)||{}).dateAjout : new Date().toISOString()
  };

  if (editingId) {
    wines = wines.map(w => w.id === editingId ? wine : w);
  } else {
    wines.push(wine);
  }
  save();
  closeModal('addModal');
  renderList();
}

// ====== DETAIL ======
function openDetail(id) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  const stars = '★'.repeat(w.note||0) + '☆'.repeat(5-(w.note||0));
  const now = new Date().getFullYear();
  const age = w.annee ? (now - w.annee) : null;
  const apogeeInfo = w.apogee ? (w.apogee > now ? `À boire à partir de ${w.apogee}` : `Apogée atteint en ${w.apogee}`) : null;

  document.getElementById('detailContent').innerHTML = `
    <div class="modal-header">
      <div class="modal-title"></div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-header">
        <div class="detail-color-icon">${ICONS[w.couleur]}</div>
        <div class="detail-wine-name">${w.nom}</div>
        ${w.domaine ? `<div class="detail-domain">${w.domaine}</div>` : ''}
        ${w.annee ? `<div class="detail-year-badge">${w.annee}</div>` : ''}
      </div>
      <div class="detail-grid">
        <div class="detail-item">
          <div class="detail-item-label">Couleur</div>
          <div class="detail-item-value">${w.couleur.charAt(0).toUpperCase()+w.couleur.slice(1)}</div>
        </div>
        <div class="detail-item">
          <div class="detail-item-label">Quantité</div>
          <div class="detail-item-value">${w.quantite} 🍾</div>
        </div>
        ${w.pays ? `<div class="detail-item"><div class="detail-item-label">Pays</div><div class="detail-item-value">${w.pays}</div></div>` : ''}
        ${w.region ? `<div class="detail-item"><div class="detail-item-label">Région</div><div class="detail-item-value">${w.region}</div></div>` : ''}
        ${w.appellation ? `<div class="detail-item"><div class="detail-item-label">Appellation</div><div class="detail-item-value">${w.appellation}</div></div>` : ''}
        ${w.cepage ? `<div class="detail-item"><div class="detail-item-label">Cépage(s)</div><div class="detail-item-value">${w.cepage}</div></div>` : ''}
        ${age !== null ? `<div class="detail-item"><div class="detail-item-label">Âge</div><div class="detail-item-value">${age} ans</div></div>` : ''}
        ${w.prix ? `<div class="detail-item"><div class="detail-item-label">Prix</div><div class="detail-item-value">${w.prix} €</div></div>` : ''}
        ${w.note ? `<div class="detail-item"><div class="detail-item-label">Ma note</div><div class="detail-item-value">${stars}</div></div>` : ''}
        ${apogeeInfo ? `<div class="detail-item"><div class="detail-item-label">Apogée</div><div class="detail-item-value" style="font-size:13px">${apogeeInfo}</div></div>` : ''}
      </div>
      ${w.notes ? `<div class="detail-notes">« ${w.notes} »</div>` : ''}
      <div class="detail-actions">
        <button class="btn-secondary" onclick="openEdit(${w.id})">✏️ Modifier</button>
        <button class="btn-secondary" onclick="adjustQty(${w.id}, -1)">−1 bouteille</button>
        <button class="btn-danger" onclick="deleteWine(${w.id})">🗑 Supprimer</button>
      </div>
    </div>`;
  openModal('detailModal');
}

function adjustQty(id, delta) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  w.quantite = Math.max(0, (parseInt(w.quantite)||1) + delta);
  if (w.quantite === 0) {
    if (!confirm('Plus de bouteille — supprimer ce vin ?')) { w.quantite = 1; return; }
    wines = wines.filter(x => x.id !== id);
    closeModal('detailModal');
    save(); renderList(); return;
  }
  save();
  openDetail(id);
  renderList();
}

function deleteWine(id) {
  if (!confirm('Supprimer ce vin de la cave ?')) return;
  wines = wines.filter(w => w.id !== id);
  save();
  closeModal('detailModal');
  renderList();
}

// ====== STATS ======
function renderStats() {
  const makeChart = (containerId, items, colorFn) => {
    if (!items.length) { document.getElementById(containerId).innerHTML = '<p style="color:rgba(232,213,163,0.3);font-size:12px">Aucune donnée</p>'; return; }
    const max = Math.max(...items.map(i=>i.count));
    document.getElementById(containerId).innerHTML = items.slice(0,6).map(i => `
      <div class="bar-item">
        <div class="bar-label">${i.label}</div>
        <div class="bar-track"><div class="bar-fill ${colorFn(i.label)}" style="width:${(i.count/max*100).toFixed(0)}%"></div></div>
        <div class="bar-count">${i.count}</div>
      </div>`).join('');
  };

  // Color chart
  const colors = ['rouge','blanc','rose','petillant'];
  const colorItems = colors.map(c => ({label:c.charAt(0).toUpperCase()+c.slice(1), count:wines.filter(w=>w.couleur===c).reduce((s,w)=>s+(parseInt(w.quantite)||1),0)})).filter(i=>i.count>0);
  makeChart('colorChart', colorItems, l => l.toLowerCase());

  // Region
  const regions = {};
  wines.forEach(w => { if(w.region) regions[w.region] = (regions[w.region]||0)+(parseInt(w.quantite)||1); });
  const regionItems = Object.entries(regions).sort((a,b)=>b[1]-a[1]).map(([label,count])=>({label,count}));
  makeChart('regionChart', regionItems, () => 'rouge');

  // Cepage
  const cepages = {};
  wines.forEach(w => { (w.cepage||'').split(',').forEach(c => { c=c.trim(); if(c) cepages[c]=(cepages[c]||0)+(parseInt(w.quantite)||1); }); });
  const cepageItems = Object.entries(cepages).sort((a,b)=>b[1]-a[1]).map(([label,count])=>({label,count}));
  makeChart('cepageChart', cepageItems, () => 'blanc');

  // Decade
  const decades = {};
  wines.forEach(w => { if(w.annee) { const d = Math.floor(w.annee/10)*10+'s'; decades[d]=(decades[d]||0)+(parseInt(w.quantite)||1); } });
  const decadeItems = Object.entries(decades).sort((a,b)=>b[0].localeCompare(a[0])).map(([label,count])=>({label,count}));
  makeChart('decadeChart', decadeItems, () => 'rouge');
}

// ====== SOMMELIER ======
function renderSommelier() {
  const cont = document.getElementById('sommelierContent');
  if (!wines.length) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon">🎩</div><p>Ajoutez des vins<br>pour recevoir des conseils</p></div>`;
    return;
  }
  const now = new Date().getFullYear();
  const readyNow = wines.filter(w => w.apogee && w.apogee <= now && w.apogee >= now-2);
  const topRated = wines.filter(w => (w.note||0) >= 4).sort((a,b)=>(b.note||0)-(a.note||0));
  const oldest = wines.filter(w => w.annee).sort((a,b) => a.annee-b.annee);
  const noRegion = wines.filter(w => !w.region).length;

  let html = '';

  if (readyNow.length) {
    html += `<div class="suggestion-card">
      <h3>🍾 À déboucher maintenant</h3>
      <p>${readyNow.slice(0,3).map(w=>`<strong>${w.nom}</strong> ${w.annee}`).join(', ')} — Ces vins sont à leur apogée !</p>
      <span class="s-tag">Prêts à déguster</span>
    </div>`;
  }

  if (topRated.length) {
    html += `<div class="suggestion-card">
      <h3>⭐ Vos coups de cœur</h3>
      <p>${topRated.slice(0,3).map(w=>`<strong>${w.nom}</strong> (${'★'.repeat(w.note)})`).join('<br>')}</p>
      <span class="s-tag">Meilleures notes</span>
    </div>`;
  }

  if (oldest.length) {
    const w = oldest[0];
    html += `<div class="suggestion-card">
      <h3>🏺 Le plus vieux de la cave</h3>
      <p><strong>${w.nom}</strong> — Millésime ${w.annee} (${now - w.annee} ans). ${w.annee < 2000 ? 'Un vin d\'exception à surveiller.' : 'Belle garde pour ce flacon.'}</p>
      <span class="s-tag">Vieille garde</span>
    </div>`;
  }

  // Diversity tip
  const colorCount = new Set(wines.map(w=>w.couleur)).size;
  if (colorCount < 3) {
    const missing = ['rouge','blanc','rose'].filter(c => !wines.find(w=>w.couleur===c));
    html += `<div class="suggestion-card">
      <h3>💡 Diversifiez votre cave</h3>
      <p>Il manque quelques ${missing.map(c=>c+'s').join(' et ')} pour une cave équilibrée. Pensez à explorer ces couleurs !</p>
      <span class="s-tag">Conseil diversité</span>
    </div>`;
  }

  if (noRegion > 0) {
    html += `<div class="suggestion-card">
      <h3>📝 Données incomplètes</h3>
      <p>${noRegion} vin${noRegion>1?'s':''} sans région renseignée. Compléter les informations améliore votre suivi.</p>
      <span class="s-tag">À compléter</span>
    </div>`;
  }

  if (!html) {
    html = `<div class="suggestion-card"><h3>✅ Cave bien organisée</h3><p>Votre cave est bien documentée. Continuez à enrichir vos notes de dégustation pour un meilleur suivi.</p></div>`;
  }

  cont.innerHTML = html;
}

// ====== NAV ======
function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('caveView').classList.toggle('hidden', view !== 'cave');
  document.getElementById('statsView').classList.toggle('active', view === 'stats');
  document.getElementById('sommelierView').classList.toggle('active', view === 'sommelier');

  if (view === 'stats') renderStats();
  if (view === 'sommelier') renderSommelier();
}
